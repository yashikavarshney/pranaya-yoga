<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pranaya - Yoga & Meditation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Outfit', 'sans-serif'] },
                    colors: { primary: '#F26651', secondary: '#8B5E3C', accent: '#FDE6D8', background: '#FAF9F6' }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        .mobile-frame { width: 375px; height: 812px; @apply bg-background overflow-hidden relative shadow-2xl rounded-[3rem] border-8 border-neutral-900 mx-auto my-8; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = window.Motion;
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };
        const App = () => {
            const [screen, setScreen] = useState('onboarding');
            const renderScreen = () => {
                if (screen === 'onboarding') return (
                    <div className="h-full flex flex-col bg-white p-6 pt-10 items-center">
                        <img src="https://images.unsplash.com/photo-1506126613408-eca07ce68773?auto=format&fit=crop&q=80&w=1000" className="w-full aspect-[4/5] rounded-[3rem] object-cover mb-8 shadow-xl" />
                        <h1 className="font-display text-3xl font-bold text-neutral-900 mb-2">Begin gently.</h1>
                        <button onClick={() => setScreen('home')} className="w-full bg-primary text-white py-4 rounded-full font-bold mt-auto mb-8">Let's Begin</button>
                    </div>
                );
                return (
                    <div className="h-full overflow-y-auto p-6">
                        <header className="flex justify-between items-center mb-8">
                            <Icon name="menu" /><h1 className="font-display text-xl font-bold">Pranaya</h1><div className="w-10 h-10 bg-accent rounded-full flex items-center justify-center font-bold text-secondary">YV</div>
                        </header>
                        <h2 className="text-3xl font-bold mb-6">Today's Flow</h2>
                        <div className="bg-accent rounded-[2rem] p-8 mb-8" onClick={() => setScreen('onboarding')}>
                            <h3 className="text-2xl font-bold text-secondary mb-2">Voice of Yoga</h3>
                            <button className="bg-primary text-white px-6 py-2 rounded-full text-sm font-bold">Join Challenge</button>
                        </div>
                    </div>
                );
            };
            return <div className="min-h-screen bg-neutral-100 flex items-center justify-center"><div className="mobile-frame">{renderScreen()}</div></div>;
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
